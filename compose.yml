services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: greenpages
      POSTGRES_USER: greenpages
      POSTGRES_PASSWORD: greenpages
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U greenpages"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://greenpages:greenpages@postgres:5432/greenpages?sslmode=disable
      PORT: "8080"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    volumes:
      - ./frontend/src:/app/src
    environment:
      VITE_API_URL: http://localhost:8080

volumes:
  pgdata:
